services:
  postgres:
    image: postgres:16-alpine
    container_name: jimeng2api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jimeng2api}
      POSTGRES_USER: ${POSTGRES_USER:-jimeng2api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  jimeng2api:
    image: jimeng2api:latest
    container_name: jimeng2api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jimeng2api}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jimeng2api}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?set ADMIN_API_KEY}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?set TOKEN_ENCRYPTION_KEY}
      ADMIN_AUTH_DISABLED: ${ADMIN_AUTH_DISABLED:-false}
      TOKEN_HEALTH_CHECK_INTERVAL_MS: ${TOKEN_HEALTH_CHECK_INTERVAL_MS:-300000}
      TOKEN_HEALTH_FAILURE_THRESHOLD: ${TOKEN_HEALTH_FAILURE_THRESHOLD:-2}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      DINGTALK_AT_MOBILES: ${DINGTALK_AT_MOBILES:-}
      DINGTALK_AT_USER_IDS: ${DINGTALK_AT_USER_IDS:-}
      DINGTALK_AT_ALL: ${DINGTALK_AT_ALL:-false}
    ports:
      - "5100:5100"
    #volumes:
    #  # 挂载日志目录（确保权限正确）
    #  - ./logs:/app/logs
    #  # 挂载临时目录
    #  - ./tmp:/app/tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5100/ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data: